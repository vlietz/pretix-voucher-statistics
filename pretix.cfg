[pretix]
instance_name=Local Dev
url=http://localhost:8000
currency=EUR
datadir=/data/pretix
; Activate the plugin by default for all new events
plugins=pretix.plugins.banktransfer,pretix_voucher_statistics

[database]
backend=postgresql
name=pretix
user=pretix
password=pretix
host=db
port=5432

[cache]
backend=redis
location=redis://redis/0

[celery]
backend=redis://redis/1
broker=redis://redis/2

[mail]
from=pretix@localhost
host=localhost
port=25

[django]
; Change this secret before any real use
secret=dev-only-not-for-production-change-me

[pretixskill]
; Disable auto-upgrade checks in dev
autoupgrade=false
